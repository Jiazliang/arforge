swc:
  name: "Sensor"
  runnables:
    - name: "Runnable_Publish"
      timingEventMs: 10
      writes:
        - port: "Pp_VehicleSpeed"
          dataElement: "VehicleSpeed"
  ports:
    - name: "Pp_VehicleSpeed"
      direction: "provides"
      interfaceRef: "If_VehicleSpeed_Backup"
    - name: "Rp_Command"
      direction: "provides"
      interfaceRef: "If_Command"
